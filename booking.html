<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Leadgram — Запись на мойку</title>

<style>
:root{
  --bg:#f7f9fc; --card:#fff; --text:#1e293b; --hint:#64748b;
  --btn:#2563eb; --btn-dark:#1d4ed8; --btn-soft:#eff4ff; --sep:#eef2f7; --radius:16px;
  color-scheme:light;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{color-scheme:light}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent;forced-color-adjust:none}

.topbar{background:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--sep);position:sticky;top:0;z-index:10}
.logo{font-size:18px;font-weight:800;letter-spacing:-.4px;color:var(--btn)}
.lang-btn{background:none;border:1px solid var(--sep);color:var(--hint);font-size:13px;padding:5px 10px;border-radius:10px;cursor:pointer}

.page{padding:14px 14px 90px;display:none}
.page.active{display:block}

.card{background:var(--card);border:1px solid var(--sep);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(16,24,40,.05)}
.h{font-size:16px;font-weight:700;margin-bottom:14px}

.label{font-size:13px;font-weight:600;color:var(--hint);margin-bottom:6px;display:block}
.group{margin-bottom:14px}
.input{width:100%;background:#fbfcfe;border:1px solid var(--sep);border-radius:10px;padding:12px 14px;font-size:16px;color:var(--text);outline:none;font-family:inherit;transition:border-color .15s,box-shadow .15s}
.input:focus{border-color:var(--btn);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
select.input{appearance:none;-webkit-appearance:none}

.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.svc{background:#fbfcfe;border:2px solid var(--sep);border-radius:12px;padding:12px;cursor:pointer;text-align:center;transition:border-color .15s,background .15s}
.svc.on{border-color:var(--btn);background:var(--btn-soft)}
.svc .n{font-size:13px;font-weight:600}
.svc .p{font-size:12px;color:var(--hint);margin-top:2px}

.row{display:flex;gap:8px}
.row .group{flex:1}

.btn{width:100%;background:var(--btn);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s,transform .1s}
.btn:hover{background:var(--btn-dark)} .btn:active{transform:scale(.99)} .btn:disabled{opacity:.5}

.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:9px 14px;border-radius:10px;border:2px solid var(--sep);background:#fbfcfe;font-size:14px;font-weight:600;cursor:pointer}
.chip.on{border-color:var(--btn);background:var(--btn-soft);color:var(--btn)}

.badge{display:inline-block;font-size:12px;font-weight:700;padding:4px 11px;border-radius:20px}
.b-pending{background:#fef4e6;color:#b45309}
.b-approved{background:#e7f7ef;color:#047857}
.b-declined{background:#fdecec;color:#b91c1c}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--sep);display:flex;gap:6px;padding:6px 8px env(safe-area-inset-bottom,6px);z-index:20}
.nav-btn{flex:1;background:none;border:none;cursor:pointer;padding:8px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--hint);font-size:11px;font-weight:600;border-radius:12px}
.nav-btn.active{color:var(--btn);background:var(--btn-soft)}
.nav-btn .ic{font-size:22px}

.empty{text-align:center;padding:50px 20px;color:var(--hint)}
.empty .ic{font-size:48px;margin-bottom:10px}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:11px 20px;border-radius:20px;font-size:14px;font-weight:500;z-index:99;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.plate-prev{font-family:monospace;font-weight:800;font-size:20px;letter-spacing:1px;background:#fbfcfe;border-radius:10px;padding:10px 14px;text-align:center;margin-top:8px;display:none}
.muted{font-size:12px;color:var(--hint);margin-top:6px;min-height:0;}
#branchMap{height:220px;border-radius:12px;border:1px solid var(--sep);margin-top:10px;display:none;overflow:hidden}
#branchMap iframe{width:100%;height:100%;border:none;border-radius:12px;}
.map-nearest-btn{width:100%;margin-top:8px;background:var(--btn-soft);color:var(--btn);border:1.5px solid var(--btn);border-radius:10px;padding:10px;font-size:14px;font-weight:600;cursor:pointer}
.gps-card{background:#e7f7ef;border:1px solid #10b981;border-radius:12px;padding:14px;margin-top:10px;display:none}
.gps-card a{color:#047857;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px}
</style>
</head>

        <option>Tesla</option><option>Ford</option><option>Renault</option>
        <option value="__other__">Другое</option>

    </div>

    <div class="group" id="modelGroup" style="display:none;">
      <label class="label" id="lModel">Модель</label>
      <select class="input" id="selModel" onchange="onBookModelChange()">
        <option value="">— Модель —</option>
      </select>
      <input class="input" id="inpModelOther" type="text" placeholder="Введите модель" style="display:none;margin-top:8px;" oninput="selModelVal=this.value.trim();buildSvc()">
    </div>

    <div class="group">
      <label class="label" id="lPlate">Гос. номер</label>
      <div style="display:flex;gap:8px;">
        <select class="input" id="plateRegion" style="max-width:90px;" onchange="onRegion()">
          <option>01</option><option>10</option><option>20</option><option>25</option>
          <option>30</option><option>40</option><option>50</option><option>60</option>
          <option>70</option><option>75</option><option>80</option><option>85</option>
          <option>90</option><option>95</option>
        </select>
        <input class="input" id="inpPlate" type="text" autocapitalize="characters" autocomplete="off" spellcheck="false" placeholder="A123AA" maxlength="6" oninput="onPlate()" style="flex:1;">
      </div>
      <div class="plate-prev" id="platePrev"></div>
    </div>

    <div class="group">
      <label class="label" id="lPhone">Телефон</label>
      <div style="display:flex;align-items:center;background:#fbfcfe;border:1px solid var(--sep);border-radius:10px;padding:0 12px;">
        <span style="font-size:16px;font-weight:600;color:var(--text);">+998</span>
        <input id="inpPhone" type="tel" inputmode="numeric" maxlength="12"
               style="border:none;background:transparent;outline:none;font-size:16px;padding:12px 8px;flex:1;color:var(--text);"
               placeholder="90 123-45-67" oninput="onPhoneInput()">
      </div>
    </div>

    <div class="group">
      <label class="label" id="lService">Услуга</label>
      <div class="muted" id="svcHint" style="margin-bottom:8px;"></div>
      <div class="svc-grid" id="svcGrid"></div>
    </div>

    <button class="btn" id="submitBtn" onclick="submitBooking()"><span id="submitLbl">✅ Забронировать</span></button>
  </div>
</div>

<!-- ── My bookings tab ──────────────────────────────────── -->
<div class="page" id="pageMine">
  <div class="h" style="padding:4px 2px 10px;" id="hMine">📋 Мои записи</div>
  <div id="mineList"><div class="empty"><div class="ic">⏳</div><p>Загрузка…</p></div></div>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navBook" onclick="switchTab('book')"><span class="ic">📅</span><span id="navBookLbl">Запись</span></button>
  <button class="nav-btn" id="navMine" onclick="switchTab('mine')"><span class="ic">📋</span><span id="navMineLbl">Мои записи</span></button>
</nav>

<div id="toast"></div>

const DEFAULT_SVC={express:{ru:'Экспресс мойка',uz:'Ekspress yuvish',price:50000},premium:{ru:'Премиум мойка',uz:'Premium yuvish',price:120000}};

// ── Car-luxury pricing ───────────────────────────────────────────────
// The more expensive / premium the car, the higher the wash fee. Each
// CAR MODEL belongs to a class (economy / comfort / premium); the class
// adds a fixed surcharge on top of the base service price.
//
// HOW PRICING IS RESOLVED, in order:
//   1. MODEL_TIER[brand][model]  — explicit per-model class (most precise)
//   2. BRAND_DEFAULT_TIER[brand] — fallback for any model not listed above
//   3. DEFAULT_TIER              — unknown / free-typed brand
//
// To retune all prices at once, edit TIER_SURCHARGE. To re-class a model,
// move it between the lists in MODEL_TIER below.
const TIER_SURCHARGE={economy:0, comfort:40000, premium:90000};
const TIER_LABEL={
  economy:{ru:'Эконом', uz:'Ekonom'},
  comfort:{ru:'Комфорт',uz:'Komfort'},
  premium:{ru:'Премиум',uz:'Premium'},
};
// Unknown / free-typed brand → neutral middle class (worker can adjust on site).
const DEFAULT_TIER='comfort';

// Default class for any model NOT explicitly listed in MODEL_TIER.
const BRAND_DEFAULT_TIER={
  Chevrolet:'economy', Daewoo:'economy', Ravon:'economy',
  Kia:'comfort', Hyundai:'comfort', BYD:'comfort', Chery:'comfort',
  Geely:'comfort', Haval:'comfort', Changan:'comfort', Toyota:'comfort',
  Honda:'comfort', Nissan:'comfort', Mazda:'comfort', Volkswagen:'comfort',
  Ford:'comfort', Renault:'comfort',
  Lexus:'premium', BMW:'premium', Mercedes:'premium', Audi:'premium',
  Porsche:'premium', Tesla:'premium',
};

// Per-model class. Only models that differ from their brand default need
// listing — but premium/luxury brands are spelled out for clarity too.
const MODEL_TIER={
  Chevrolet:{
    Tahoe:'premium', Traverse:'premium', Trailblazer:'premium', Equinox:'premium',
    Malibu:'comfort', Captiva:'comfort', Tracker:'comfort', Onix:'comfort', Monza:'comfort',
    // economy (brand default): Cobalt, Lacetti, Nexia 3, Nexia, Spark, Matiz, Damas, Labo, Gentra
  },
  Kia:{
    K8:'premium', Sorento:'premium', Carnival:'premium', Stinger:'premium', Telluride:'premium',
    Rio:'economy',
  },
  Hyundai:{
    'Santa Fe':'premium', Palisade:'premium', 'Ioniq 5':'premium', 'Ioniq 6':'premium',
    Accent:'economy',
  },
  BYD:{
    'Song Plus':'premium', Sealion:'premium', 'Seal 6':'premium', 'Atto 8':'premium', Tang:'premium', Han:'premium',
    Seagull:'economy',
  },
  Chery:{ 'Tiggo 9':'premium', 'Tiggo 8 Pro':'premium' },
  Geely:{ Tugella:'premium', Monjaro:'premium' },
  Haval:{ H9:'premium' },
  Changan:{ CS85:'premium', 'UNI-K':'premium' },
  Toyota:{ 'Land Cruiser':'premium', Highlander:'premium', Fortuner:'premium' },
  Honda:{ Pilot:'premium', Odyssey:'premium' },
  Nissan:{ Patrol:'premium', Murano:'premium' },
  Mazda:{ 'CX-9':'premium' },
  Volkswagen:{ Touareg:'premium', Polo:'economy' },
  Ford:{ Explorer:'premium', Mustang:'premium', 'F-150':'premium' },
  Renault:{ Logan:'economy', Sandero:'economy' },
};

// Returns the car's class key for the current brand+model selection.
function carTier(){
  const brand=(selBrandVal||'').trim();
  if(!brand) return null;
  const model=(selModelVal||'').trim();
  const bm=MODEL_TIER[brand];
  if(bm && model && bm[model]) return bm[model];
  return BRAND_DEFAULT_TIER[brand] || DEFAULT_TIER;
}
function carSurcharge(){
  const t=carTier();
  return t ? (TIER_SURCHARGE[t]||0) : 0;
}

function toggleLang(){lang=lang==='ru'?'uz':'ru';document.getElementById('langBtn').textContent=lang.toUpperCase();applyLang();buildSvc();renderBranches();loadMine();}
function applyLang(){
  const L=T[lang];
  ['hBook','lBranch','lDate','lTime','lService','lPlate','lPhone','submitLbl','navBookLbl','navMineLbl','hMine'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent=L[id];
  });
  const nb=document.getElementById('nearestBtnLbl');
  if(nb) nb.textContent=lang==='uz'?'Eng yaqin filial':'Ближайший филиал';
  const lb=document.getElementById('lBrand');
  if(lb) lb.textContent=lang==='uz'?'Avtomobil markasi':'Марка автомобиля';
  const lm=document.getElementById('lModel');
  if(lm) lm.textContent=lang==='uz'?'Model':'Модель';
}

function switchTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(t==='book'){document.getElementById('pageBook').classList.add('active');document.getElementById('navBook').classList.add('active');}
  else{document.getElementById('pageMine').classList.add('active');document.getElementById('navMine').classList.add('active');loadMine();}
}

async function loadBranches(){
  try{const{data}=await sb.rpc('get_branches');branches=Array.isArray(data)?data:[];}catch(e){branches=[];}
  renderBranches();
}
function renderBranches(){
  const sel=document.getElementById('selBranch');
  const allOpt=`<option value="">${lang==='uz'?'🌐 Barcha filiallar':'🌐 Все филиалы'}</option>`;
  sel.innerHTML=allOpt+branches.map(b=>`<option value="${b.id}">${b.name}</option>`).join('');
  onBranchChange();
}
function onBranchChange(){
  const val=document.getElementById('selBranch').value;
  const b=branches.find(x=>String(x.id)===String(val));
  const hint=document.getElementById('branchHours');
  if(b){
    hint.textContent=`🕒 ${T[lang].open}: ${b.work_open}–${b.work_close}`;

// ── Queue load preview (how many cars already booked) ──────────────
let _load = [];
// Returns HH:MM that is `addMin` minutes from now, clamped above `workOpen`
function autoBookTime(workOpen, addMin) {
  addMin = addMin || 20;
  const d = new Date(Date.now() + addMin * 60 * 1000);
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const t20 = hh + ':' + mm;
  return (workOpen && workOpen > t20) ? workOpen : t20;
}
// Returns minimum allowed time (now + 10 min), clamped above workOpen
function minBookTime(workOpen) {
  const d = new Date(Date.now() + 10 * 60 * 1000);
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const t10 = hh + ':' + mm;
  return (workOpen && workOpen > t10) ? workOpen : t10;
}

// Retry wrapper for transient network failures ("TypeError: Load failed")
async function rpcRetry(fn, tries=4, delayMs=250){
  let lastErr;
  for(let i=0;i<tries;i++){
    try{
      const res=await fn();
      if(res && res.error) throw res.error;
      return res;
    }catch(e){
      lastErr=e;
      const msg=(e&&e.message||'').toLowerCase();
      const isNetwork=msg.includes('load failed')||msg.includes('failed to fetch')||msg.includes('network')||e.name==='TypeError';
      if(!isNetwork||i===tries-1) throw e;
      await new Promise(r=>setTimeout(r,delayMs*(i+1)));
    }
  }
  throw lastErr;
}

function buildFullPlate(){
  const region=(document.getElementById('plateRegion').value||'01');
  const rest=(document.getElementById('inpPlate').value||'').toUpperCase().replace(/[^A-Z0-9]/g,'');
  return normPlate(rest) || normPlate(region+rest);
}
function onPlate(){
  const n=buildFullPlate();
  const pv=document.getElementById('platePrev');
  if(n){selPlate=n;pv.textContent=n.replace(' | ',' ');pv.style.display='block';}
  else{selPlate='';pv.style.display='none';}

function normPlate(raw){
  const s=raw.toUpperCase().replace(/[|\-\s]/g,'');
  let m=s.match(/^(\d{2})([A-Z])(\d{3})([A-Z]{2})$/); if(m)return `${m[1]} | ${m[2]} ${m[3]} ${m[4]}`;
  m=s.match(/^(\d{2})(\d{3})([A-Z]{3})$/); if(m)return `${m[1]} | ${m[2]} ${m[3]}`;
  return '';
}

// Tashkent (GMT+5) time "HH:MM", timezone-independent
function _tashHM(s){
  if(!s) return '';
  s=String(s).trim().replace(' ','T');
  if(!/[zZ]$|[+\-]\d{2}:?\d{2}$/.test(s)) s+='Z';
  const d=new Date(s); if(isNaN(d.getTime())) return '';
  const t=new Date(d.getTime()+5*3600*1000);
  return String(t.getUTCHours()).padStart(2,'0')+':'+String(t.getUTCMinutes()).padStart(2,'0');
}

// Live wash-progress block for the customer
function washProgress(b){
  const uz=lang==='uz';
  const wf=b.workflow_status||'queue';
  const st=b.status||'pending';
  // Only show progress once the booking is approved/arrived
  if(st!=='approved' && b.source==='customer' && st!=='arrived') return '';
  const start=b.wash_started_at?_tashHM(b.wash_started_at):'';
  const end=b.wash_finished_at?_tashHM(b.wash_finished_at):'';
  // estimated end = start + service duration (default 30 min)
  let est='';
  if(start && !end && b.wash_started_at){
    const dur=(services[b.service]?.dur)||30;
    est=_tashHM(new Date(new Date(b.wash_started_at).getTime()+dur*60000).toISOString());
  }
  let title, color, detail='';
  if(wf==='done'){
    title=uz?'✅ Tayyor — mashinangiz yuvildi':'✅ Готово — ваша машина вымыта';
    color='#10b981';
    detail=end?(uz?`Tugadi: ${end}`:`Завершено в ${end}`):'';
  } else if(wf==='washing'){
    title=uz?'🚿 Yuvilmoqda…':'🚿 Моется…';
    color='#2563eb';
    detail=(start?(uz?`Boshlandi: ${start}`:`Начато: ${start}`):'')+
           (est?(uz?` · taxminan ${est} da tayyor`:` · ~готово к ${est}`):'');
  } else {
    title=uz?'🅿️ Navbatda':'🅿️ В очереди';
    color='#f59e0b';
    detail=uz?'Tez orada boshlanadi':'Скоро начнём';
  }
  return `<div style="margin-top:10px;border-left:4px solid ${color};background:#f8fafc;border-radius:10px;padding:10px 12px;">
    <div style="font-weight:700;font-size:14px;color:${color};">${title}</div>
    ${detail?`<div style="font-size:12px;color:var(--hint);margin-top:3px;">${detail}</div>`:''}
  </div>`;
}

function findNearest(){
  const uz = lang==='uz';
  const btn = document.getElementById('nearestBtn');
  if(btn) btn.disabled = true;
  if(!navigator.geolocation){
    toast(uz?'Geolokatsiya qo\'llab-quvvatlanmaydi':'Геолокация не поддерживается', true);
    if(btn) btn.disabled = false;
    return;
  }
  navigator.geolocation.getCurrentPosition(pos => {
    const {latitude:ulat, longitude:ulng} = pos.coords;
    let nearest = null, minDist = Infinity;
    branches.forEach(b => {
      const lat = parseFloat(b.lat||b.latitude||0);
      const lng = parseFloat(b.lng||b.longitude||b.lon||0);
      if(!lat||!lng) return;
      const d = Math.hypot(lat-ulat, lng-ulng);
      if(d < minDist){ minDist=d; nearest=b; }
    });
    if(nearest){
      const sel = document.getElementById('selBranch');
      if(sel) sel.value = String(nearest.id);
      onBranchChange();
      toast((uz?'Eng yaqin filial: ':'Ближайший филиал: ')+nearest.name);
      // Show Yandex Maps with route from user to nearest branch
      const nlat = parseFloat(nearest.lat||nearest.latitude||0);
      const nlng = parseFloat(nearest.lng||nearest.longitude||nearest.lon||0);
      if(nlat && nlng){
        // map-widget is the only Yandex URL that embeds; show a route to the branch
        const routeUrl = `https://yandex.uz/map-widget/v1/?rtext=${ulat},${ulng}~${nlat},${nlng}&rtt=auto`;
        const mapBox = document.getElementById('branchMap');
        if(mapBox){
          mapBox.style.display = 'block';
          mapBox.innerHTML = `<iframe src="${routeUrl}" allowfullscreen loading="lazy"></iframe>`;
        }
        showGpsCard(nearest, nlat, nlng, nearest.address||'');
      } else {
        showBranchOnMap(nearest);
      }
    } else {
      // No branch has coordinates yet — center the map on the customer instead,
      // so they at least see where they are and nearby branches by name search.
      const mapBox = document.getElementById('branchMap');
      if(mapBox){
        mapBox.style.display = 'block';
        mapBox.innerHTML = `<iframe src="https://yandex.uz/map-widget/v1/?ll=${ulng},${ulat}&z=13&l=map&pt=${ulng},${ulat},pm2bll" allowfullscreen loading="lazy"></iframe>`;
      }
      toast(uz?'Filiallarda koordinata yo\'q — joylashuvingiz xaritada'
             :'У филиалов нет координат — показана ваша геопозиция');
    }
    if(btn) btn.disabled = false;
  }, () => {
    toast(uz?'Joylashuvga ruxsat berilmadi':'Доступ к геолокации отклонён', true);
    if(btn) btn.disabled = false;
  });
}

function showConfirmGps(branchObj){
  if(!branchObj) return;
  showBranchOnMap(branchObj);
}

// ── Remember the customer's last entries and pre-fill them next time ──
const PREFILL_KEY='lg_booking_prefill';
function savePrefill(){
  try{
    const data={
      branchId: document.getElementById('selBranch').value||'',
      svc:      selSvc||'',
      region:   document.getElementById('plateRegion').value||'',
      plate:    document.getElementById('inpPlate').value||'',
      brand:    selBrandVal||'',
      model:    selModelVal||'',
      phone:    document.getElementById('inpPhone').value||''
    };
    localStorage.setItem(PREFILL_KEY, JSON.stringify(data));
  }catch(e){}
}
function restorePrefill(){
  let data; try{ data=JSON.parse(localStorage.getItem(PREFILL_KEY)||'null'); }catch(e){ data=null; }
  if(!data) return;
  // Branch (only if it still exists)
  const selBranch=document.getElementById('selBranch');
  if(data.branchId && branches.some(b=>String(b.id)===String(data.branchId))){
    selBranch.value=String(data.branchId);
    onBranchChange();
  }
  // Service
  if(data.svc && services[data.svc]){ selSvc=data.svc; buildSvc(); }
  // Plate
  if(data.region) document.getElementById('plateRegion').value=data.region;
  if(data.plate){ document.getElementById('inpPlate').value=data.plate; onPlate(); }
  // Phone
  if(data.phone){ document.getElementById('inpPhone').value=data.phone; onPhoneInput(); }
  // Brand + model (match dropdown, else use the "Другое" free-text path)
  if(data.brand){
    const selBrand=document.getElementById('selBrand');
    const known=Array.from(selBrand.options).some(o=>o.value===data.brand);
    if(known){
      selBrand.value=data.brand; onBookBrandChange();
      if(data.model){
        const selModel=document.getElementById('selModel');
        const knownM=Array.from(selModel.options).some(o=>o.value===data.model);
        if(knownM){ selModel.value=data.model; onBookModelChange(); }
        else{ selModel.value='__other__'; onBookModelChange();
              document.getElementById('inpModelOther').value=data.model; selModelVal=data.model; }
      }
    } else {
      selBrand.value='__other__'; onBookBrandChange();
      document.getElementById('inpBrandOther').value=data.brand; selBrandVal=data.brand;
    }
  }
}
</script>
